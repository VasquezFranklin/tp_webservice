<div class="container mt-4">
  <div class="card bg-primary text-white" style="max-width: 400px; margin: auto;">
    <div class="card-header bg-dark">
      <h5 class="mb-0">Conversor De Divisas</h5>
    </div>
    
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Cantidad</label>
        <input 
          type="number" 
          class="form-control" 
          [(ngModel)]="cantidad" 
          placeholder="Cantidad">
      </div>

      <div class="mb-3">
        <label class="form-label">De</label>
        <select class="form-select" [(ngModel)]="monedaOrigen">
          <option value="USD">USD Dólares EEUU</option>
          <option value="EUR">EUR Euros</option>
          <option value="ARS">ARS Pesos Argentinos</option>
          </select>
      </div>

      <div class="mb-4">
        <label class="form-label">A</label>
        <select class="form-select" [(ngModel)]="monedaDestino">
          <option value="ARS">ARS Pesos Argentinos</option>
          <option value="USD">USD Dólares EEUU</option>
          <option value="EUR">EUR Euros</option>
        </select>
      </div>

      <button class="btn btn-warning w-100 fw-bold" (click)="convertir()">
        Convertir →
      </button>

      @if (resultado() !== null) {
        <div class="alert alert-success mt-3 text-dark mb-0 fw-bold text-center">
          Resultado: {{ resultado() | number:'1.2-2' }}
        </div>
      }
    </div>
  </div>
</div>
