<div class="container mt-4">
  <div class="card shadow-sm mx-auto" style="max-width: 500px;">
    
    <div class="card-header bg-dark text-white">
      <h5 class="mb-0">Generador de Código QR</h5>
    </div>
    
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-bold">URL o Texto para el QR</label>
        <input 
          type="text" 
          class="form-control" 
          [(ngModel)]="textoIngresado" 
          placeholder="Ej: https://mi-proyecto.com">
      </div>

      <button 
        class="btn btn-primary w-100 fw-bold" 
        (click)="crearQr()" 
        [disabled]="cargando() || textoIngresado().length === 0">
        @if (cargando()) {
          <span class="spinner-border spinner-border-sm"></span> Generando...
        } @else {
          Generar QR
        }
      </button>

      @if (mensajeError()) {
        <div class="alert alert-danger mt-3 mb-0">
          {{ mensajeError() }}
        </div>
      }

      @if (qrBase64()) {
        <div class="mt-4 text-center p-3 border rounded bg-light">
          <p class="text-success fw-bold mb-2">¡Código generado con éxito!</p>
          <img [src]="qrBase64()" alt="Código QR Generado" class="img-fluid border shadow-sm">
        </div>
      }

    </div>
  </div>
</div>
